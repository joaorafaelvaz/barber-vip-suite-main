# Nginx reverse proxy config for the VPS host
# Copy this file to /etc/nginx/sites-available/barber-vip.conf
# Then: ln -s /etc/nginx/sites-available/barber-vip.conf /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name teste.franquiabv.xyz;

    # Redirect HTTP to HTTPS (after certbot setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

