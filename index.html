  <style>
    body { margin: 0; background: #080b0e; }
    #root-loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080b0e; gap: 14px;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 9999;
    }
    .vip-ring {
      width: 36px; height: 36px; position: relative;
    }
    .vip-ring::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(201, 147, 57, 0.12);
    }
    .vip-ring::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: #c99339;
      animation: vip-spin 0.75s linear infinite;
    }
    @keyframes vip-spin { to { transform: rotate(360deg); } }
    .vip-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201, 147, 57, 0.35);
      font-weight: 500;
    }
  </style>
  <body>
    <div id="root">
      <div id="root-loader">
        <div class="vip-ring"></div>
        <span class="vip-label">Barber VIP</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
